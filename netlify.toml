# Netlify build config for TanStack Start (via Nitro netlify preset).
# The `NETLIFY=true` env var (set automatically by Netlify) triggers the
# netlify preset in vite.config.ts, producing Netlify Functions + static assets.

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Required Supabase env vars (set these in Netlify → Site settings → Environment):
#   VITE_SUPABASE_URL
#   VITE_SUPABASE_PUBLISHABLE_KEY
#   VITE_SUPABASE_PROJECT_ID
#   SUPABASE_URL
#   SUPABASE_PUBLISHABLE_KEY
#   SUPABASE_SERVICE_ROLE_KEY